name: socialnetwork

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: socialnetwork
      POSTGRES_USER: socialnetwork
      POSTGRES_PASSWORD: socialnetwork
    ports:
      # 5433 en el host: el 5432 lo ocupa el PostgreSQL nativo de Odoo
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialnetwork -d socialnetwork"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # SMTP local para verificación de email y reset de contraseña (fase 1).
  # UI web: http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  # Opcional (post-beta). Arrancar con: docker compose --profile search up -d
  opensearch:
    profiles: ["search"]
    image: opensearchproject/opensearch:2
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"

  # Opcional: la app completa en contenedor. Arrancar con: docker compose --profile app up -d --build
  # En desarrollo normal la app corre fuera de Compose (mvn spring-boot:run).
  app:
    profiles: ["app"]
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/socialnetwork
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
