# Perfil de desarrollo local: apunta a los servicios de docker-compose.yml
spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/socialnetwork # 5433: el 5432 lo ocupa el Postgres de Odoo
    username: socialnetwork
    password: socialnetwork
  data:
    redis:
      host: localhost
      port: 6379
  # Mailpit (SMTP local, UI en http://localhost:8025)
  mail:
    host: localhost
    port: 1025

app:
  auth:
    jwt:
      # Solo dev: secret estable para que las sesiones sobrevivan a reinicios de la app
      secret: dev-secret-no-usar-en-produccion-0123456789abcdef
    cookies:
      secure: false # sin TLS en local

logging:
  level:
    com.socialnetwork: DEBUG
    org.hibernate.SQL: DEBUG
