spring:
  application:
    name: socialnetwork
  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate # el esquema lo gobierna Flyway, nunca Hibernate
  flyway:
    locations: classpath:db/migration
  mvc:
    problemdetails:
      enabled: true # RFC 9457 para errores estándar de Spring MVC

server:
  port: 8080
  forward-headers-strategy: framework # detrás de NGINX en producción
  error:
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true # /actuator/health/{liveness,readiness}

app:
  auth:
    frontend-base-url: http://localhost:3000 # base de los enlaces de los emails
    jwt:
      secret: ${APP_JWT_SECRET:} # vacío → clave efímera con warning (solo dev/test)
      access-ttl: 15m
    refresh:
      ttl: 30d
    verification:
      ttl: 24h
    reset:
      ttl: 1h # token de recuperación de contraseña (ventana corta)
    oauth:
      success-path: /oauth/callback # ruta del frontend tras login social correcto
      failure-path: /login?error=oauth
    cookies:
      secure: true # false solo en dev (sin TLS local)
  cors:
    allowed-origins: http://localhost:3000

# OAuth2 (login social con Google). Deshabilitado salvo que se definan las credenciales: basta con
# exportar GOOGLE_CLIENT_ID y GOOGLE_CLIENT_SECRET (Spring rellena el resto del proveedor "google").
# La URI de redirección a registrar en Google Cloud es {baseUrl}/login/oauth2/code/google.
#   security:
#     oauth2:
#       client:
#         registration:
#           google:
#             client-id: ${GOOGLE_CLIENT_ID}
#             client-secret: ${GOOGLE_CLIENT_SECRET}
#             scope: openid,email,profile

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /api-docs

info:
  app:
    name: SocialNetwork
    description: Plataforma social de entretenimiento
